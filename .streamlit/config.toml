[theme]
base = "dark"
primaryColor = "#22c55e"
backgroundColor = "#0e1117"
secondaryBackgroundColor = "#161b22"
font = "sans serif"

[server]
# true 필수 — Streamlit Cloud 등 화면/TTY 없는 서버에서 false면 이메일 입력 대기로
# 부팅이 막혀 죽는다. 로컬에서는 run.bat 이 브라우저를 대신 열어준다.
headless = true
runOnSave = true
# 터널(cloudflare/ngrok 등)로 외부 공유 시 WebSocket이 막히지 않도록 완화
enableCORS = false
enableXsrfProtection = false

[browser]
gatherUsageStats = false
